<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell patient-home">
    <div class="page-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div class="brand-name" style="font-size:1.4rem;">Mozhi</div>
      </div>
      <button id="logout-btn" class="logout-link" type="button">Log Out</button>
    </div>

    <div class="greeting-block">
      <span class="greeting-wave" aria-hidden="true">👋</span>
      <h1 class="page-title greeting-title">
        <span id="greeting-text">Hello</span><span id="greeting-name"></span>
      </h1>
      <p class="small-note greeting-subtitle">Tap the big button below whenever you need something.</p>
    </div>

    <div class="hero-stage">
      <button class="btn-hero" type="button" onclick="window.location.href='communicate.html'">
        <span class="hero-icon" aria-hidden="true">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="8" cy="10.5" r="1.15" fill="currentColor"/>
            <circle cx="12" cy="10.5" r="1.15" fill="currentColor"/>
            <circle cx="16" cy="10.5" r="1.15" fill="currentColor"/>
          </svg>
        </span>
        <span class="hero-label">Communicate</span>
      </button>

      <button class="btn-hero secondary" type="button" onclick="alert('Rehabilitation is coming soon!')">
        <span class="badge-soon">Coming Soon</span>
        <span class="hero-icon" aria-hidden="true">🏃</span>
        <span class="hero-label">Rehabilitation</span>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/patient.js"></script>
</body>
</html>
