<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell patient-home">
    <div class="page-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div class="brand-name" style="font-size:1.4rem;">Mozhi</div>
      </div>
      <button id="logout-btn" class="logout-link" type="button">Log Out</button>
    </div>

    <div class="greeting-block">
      <span class="greeting-wave" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="21.5"/><line x1="4.9" y1="4.9" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.1" y2="19.1"/><line x1="2.5" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="21.5" y2="12"/><line x1="4.9" y1="19.1" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.1" y2="4.9"/></svg>
      </span>
      <h1 class="page-title greeting-title">
        <span id="greeting-text">Hello</span><span id="greeting-name"></span>
      </h1>
      <p class="small-note greeting-subtitle">Tap the big button below whenever you need something.</p>
    </div>

    <div class="hero-stage">
      <button class="btn-hero" type="button" onclick="window.location.href='communicate.html'">
        <span class="hero-icon" aria-hidden="true">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 4h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H9l-5 4v-4H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="8" cy="10.5" r="1.15" fill="currentColor"/>
            <circle cx="12" cy="10.5" r="1.15" fill="currentColor"/>
            <circle cx="16" cy="10.5" r="1.15" fill="currentColor"/>
          </svg>
        </span>
        <span class="hero-label">Communicate</span>
      </button>

      <div class="recent-suggestions" id="recent-suggestions" style="display:none;">
        <p class="recent-suggestions-title">Recent</p>
        <div class="recent-chip-row" id="recent-chip-row">
          <!-- Chips injected by js/patient.js -->
        </div>
      </div>

      <button class="btn-hero secondary" type="button" onclick="alert('Rehabilitation is coming soon!')">
        <span class="badge-soon">Coming Soon</span>
        <span class="hero-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5 4 4"/><path d="M17.5 6.5 20 4"/><path d="M6.5 17.5 4 20"/><path d="M17.5 17.5 20 20"/><rect x="7" y="7" width="10" height="10" rx="2"/></svg>
        </span>
        <span class="hero-label">Rehabilitation</span>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/patient.js"></script>
  <script src="js/offline.js">
</body>
</html>
