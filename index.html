<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Welcome</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">
  <script src="js/loading.js"></script>

  <div class="login-bg-blob blob-a" aria-hidden="true"></div>
  <div class="login-bg-blob blob-b" aria-hidden="true"></div>

  <div class="center-shell">
    <div class="welcome-shell">

      <div class="brand welcome-brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div class="brand-name">Mozhi</div>
      </div>
      <p class="brand-tagline">A simple way to be heard.</p>

      <div class="welcome-card-grid">
        <button type="button" class="welcome-card welcome-card-first" id="welcome-first-time">
          <span class="welcome-card-icon welcome-card-icon-blue" aria-hidden="true">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5 14 9l6.5 2-6.5 2-2 6.5-2-6.5L3.5 11 10 9l2-6.5Z"/></svg>
          </span>
          <span class="welcome-card-title">First Time</span>
          <span class="welcome-card-subtitle">New to Mozhi? Learn how the app works.</span>
          <span class="welcome-card-arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </button>

        <button type="button" class="welcome-card welcome-card-existing" id="welcome-existing-user">
          <span class="welcome-card-icon welcome-card-icon-green" aria-hidden="true">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 15.5 21 7M15.5 4 21 9.5l-4 4-3-1-2 2 2 2-2.5 2.5-4-4L4 17v3h3l2.5-2.5"/></svg>
          </span>
          <span class="welcome-card-title">Existing User</span>
          <span class="welcome-card-subtitle">Already know the app? Continue to login.</span>
          <span class="welcome-card-arrow" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/darkmode.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const firstTimeBtn = document.getElementById("welcome-first-time");
      const existingUserBtn = document.getElementById("welcome-existing-user");
      if (firstTimeBtn) firstTimeBtn.addEventListener("click", () => (window.location.href = "onboarding.html"));
      if (existingUserBtn) existingUserBtn.addEventListener("click", () => (window.location.href = "login.html"));
    });
  </script>
</body>
</html>
