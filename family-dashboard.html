<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Family Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell family-home">
    <div class="page-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div class="brand-name" style="font-size:1.4rem;">Mozhi</div>
      </div>
      <button id="logout-btn" class="logout-link" type="button">Log Out</button>
    </div>

    <div class="greeting-block">
      <span class="greeting-wave" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="4.5"/><line x1="12" y1="19.5" x2="12" y2="21.5"/><line x1="4.9" y1="4.9" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.1" y2="19.1"/><line x1="2.5" y1="12" x2="4.5" y2="12"/><line x1="19.5" y1="12" x2="21.5" y2="12"/><line x1="4.9" y1="19.1" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.1" y2="4.9"/></svg>
      </span>
      <h1 class="page-title greeting-title"><span id="greeting-text">Hello</span></h1>
      <p class="small-note greeting-subtitle">Here's how your patient is doing.</p>
    </div>

    <div class="card overview-card">
      <h2 class="card-title">
        <span class="card-title-icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </span>
        Patient Overview
      </h2>
      <div id="overview-card-body">
        <div class="overview-row">
          <span class="overview-label"><span class="overview-icon overview-icon-blue" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg></span>Last communication</span>
          <span class="overview-value" id="last-communication">Loading…</span>
        </div>
        <div class="overview-row">
          <span class="overview-label"><span class="overview-icon overview-icon-purple" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9.5"/><polyline points="12 7 12 12 15.5 14"/></svg></span>Last active</span>
          <span class="overview-value" id="last-active">Loading…</span>
        </div>
        <div class="overview-row">
          <span class="overview-label"><span class="overview-icon overview-icon-red" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h16.9a2 2 0 0 0 1.8-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>Recent alerts</span>
          <span class="overview-value" id="recent-alerts">Loading…</span>
        </div>
      </div>
    </div>

    <button id="categories-btn" class="categories-hero-btn mt-16" type="button">
      <span class="categories-hero-icon" aria-hidden="true">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h15a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-7.4a2 2 0 0 1-1.7-.9L8.8 4.2A2 2 0 0 0 7.1 3.3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
      </span>
      <span class="categories-hero-text">
        <span class="categories-hero-title">Communication Categories</span>
        <span class="categories-hero-subtitle">Manage phrases and categories</span>
      </span>
      <span class="categories-hero-arrow" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </span>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/family.js"></script>
</body>
</html>
