<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Manage Phrases</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="page-header">
      <button class="icon-btn" type="button" onclick="window.location.href='family-dashboard.html'" aria-label="Back">←</button>
      <h1 class="page-title">Communication Categories</h1>
      <button id="logout-btn" class="logout-link" type="button">Log Out</button>
    </div>

    <div class="manage-category-select" id="category-chips">
      <!-- Chips injected by js/category-management.js -->
    </div>

    <form id="add-phrase-form" class="add-phrase-form">
      <input id="new-phrase-input" type="text" placeholder="Add a new phrase…" required />
      <button type="submit" class="btn btn-primary" style="width:auto; padding: 14px 20px;">Add</button>
    </form>

    <p class="form-message" id="manage-message" role="status"></p>

    <div id="manage-list">
      <!-- Phrase rows injected by js/category-management.js -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/category-management.js"></script>
</body>
</html>
