<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Log In</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="center-shell">
    <div style="width:100%; max-width: 460px;">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">M</div>
        <div class="brand-name">Mozhi</div>
      </div>
      <p class="brand-tagline">A simple way to be heard.</p>

      <div class="card">
        <!-- Tabs -->
        <div class="login-tabs" role="tablist" aria-label="Login type">
          <button type="button" class="login-tab active" data-tab="patient-panel" role="tab" aria-selected="true">
            🧑 Patient Login
          </button>
          <button type="button" class="login-tab" data-tab="family-panel" role="tab" aria-selected="false">
            👨‍👩‍👧 Family Login
          </button>
        </div>

        <!-- Patient panel -->
        <div class="login-panel active" id="patient-panel" role="tabpanel">
          <form id="patient-form" novalidate>
            <div class="field">
              <label for="patient-email">Email</label>
              <input id="patient-email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="patient-password">Password</label>
              <input id="patient-password" type="password" autocomplete="current-password" required />
            </div>
            <p class="form-message" role="status"></p>
            <button type="submit" class="btn btn-primary">Log In</button>
            <p class="field-hint text-center mt-16">You'll stay signed in for 7 days.</p>
          </form>
        </div>

        <!-- Family panel -->
        <div class="login-panel" id="family-panel" role="tabpanel">
          <form id="family-form" novalidate>
            <div class="field">
              <label for="family-email">Email</label>
              <input id="family-email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="family-password">Password</label>
              <input id="family-password" type="password" autocomplete="current-password" required />
            </div>
            <p class="form-message" role="status"></p>
            <button type="submit" class="btn btn-primary">Log In</button>
            <p class="field-hint text-center mt-16">Family sessions stay signed in for 24 hours.</p>
          </form>
        </div>
      </div>

      <p class="small-note text-center">
        Patient and family accounts use the same email and password —
        your account role determines which tab to use.
      </p>
    </div>
  </div>

  <!-- Supabase JS client (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
