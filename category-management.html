<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Mozhi — Manage Phrases</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="page-header">
      <button class="icon-btn" type="button" onclick="window.location.href='family-dashboard.html'" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <h1 class="page-title">Communication Categories</h1>
      <button id="logout-btn" class="logout-link" type="button">Log Out</button>
    </div>

    <p class="small-note mt-8" style="margin-bottom: 18px;">Select a category to manage its phrases.</p>

    <div class="manage-category-select" id="category-chips">
      <!-- Chips injected by js/category-management.js -->
    </div>

    <form id="add-phrase-form" class="add-phrase-form">
      <div class="phrase-input-wrap">
        <span class="phrase-input-icon" aria-hidden="true"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5Z"/></svg></span>
        <input id="new-phrase-input" type="text" placeholder="Add a new phrase…" required />
      </div>
      <button type="submit" class="add-phrase-btn" aria-label="Add phrase">
        <span aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
      </button>
    </form>

    <p class="form-message" id="manage-message" role="status"></p>

    <div id="manage-list">
      <!-- Phrase rows injected by js/category-management.js -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/darkmode.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/category-management.js"></script>
</body>
</html>
